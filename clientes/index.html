function calcularRutaReal(){if(!mapaIniciado||!directionsService)return;var keys=Object.keys(coordenadas).sort(function(a,b){return a-b}).map(Number);if(keys.length<2)return;var pts=keys.map(function(k){return coordenadas[k]});var o={lat:pts[0][0],lng:pts[0][1]};var d={lat:pts[pts.length-1][0],lng:pts[pts.length-1][1]};var wp=pts.slice(1,-1).map(function(p){return{location:{lat:p[0],lng:p[1]},stopover:true}});var df=conRegreso?o:d;if(conRegreso)wp.push({location:d,stopover:true});directionsService.route({origin:o,destination:df,waypoints:wp,travelMode:google.maps.TravelMode.DRIVING,region:'CO'},function(r,s){if(s==='OK'){directionsRenderer.setDirections(r);var m=0;r.routes[0].legs.forEach(function(l){m+=l.distance.value});distanciaRutaMetros=m;document.getElementById('mapa-instruccion').style.display='none'}})}
